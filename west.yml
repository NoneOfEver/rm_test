# T2: Star topology, application is the manifest repository.
# rm_test is the manifest repository (application-as-manifest).
#
# West workspace configuration (.west/config):
#   [manifest]
#   path = rm_test
#   file = west.yml

########################################
##  zephyr                    v3.7.0  ##
##  hpm_sdk                   v1.11.0 ##
########################################
manifest:
  version: "1.0"
  group-filter: [-babblesim, -optional, -hal]

  remotes:
    - name: github
      url-base: https://github.com/hpmicro
    - name: cherry-embedded
      url-base: https://github.com/cherry-embedded/
    - name: upstream
      url-base: https://github.com/zephyrproject-rtos
    - name: dust-mavlink
      url-base: https://github.com/NoneOfEver
    - name: dust-hpm
      url-base: https://github.com/NoneOfEver

  defaults:
    remote: github

  projects:
    # Zephyr RTOS and all upstream modules (T2 pattern: import zephyr manifest)
    - name: zephyr
      remote: github
      repo-path: zephyr
      revision: zsg_v0.7.0
      west-commands: zephyr/scripts/west-commands.yml
      import: true

    # HPMicro SDK (manifest repo with boards, drivers, soc, dts)
    - name: hpm_support
      remote: dust-hpm
      repo-path: hpm_support
      path: hpm_support
      revision: main

    # HPMicro-specific modules (not in upstream zephyr)
    - name: CherryUSB
      remote: cherry-embedded
      repo-path: CherryUSB
      path: modules/lib/CherryUSB
      revision: 5ffe9cbe7fb41489d99806daa8572124ace1b99b

    - name: fatfs
      repo-path: fatfs
      path: modules/fs/fatfs
      revision: 427159bf95ea49b7680facffaa29ad506b42709b

    - name: mcuboot
      repo-path: mcuboot
      revision: c098a7fe3aa03f8e21b6fe083dd8d9704db78a03
      path: bootloader/mcuboot

    # Mavlink generated headers
    - name: dust_mavlink
      remote: dust-mavlink
      repo-path: dust_mavlink
      path: mavlink
      revision: main

  self:
    path: rm_test
